<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- [AUTO] Titel wird von build.py befüllt -->
  <title>{{VERSUCH_NAME}} – {{PRAKTIKUM_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- [FONT] Schrift-URL aus style.json → fonts.google_fonts_url -->
  <link href="{{FONT_URL}}" rel="stylesheet">
  <style>

    /* ┌─────────────────────────────────────────────────────────┐
       │  ACHTUNG: CSS hier NICHT direkt bearbeiten!             │
       │  Farben, Fonts und Abstände → templates/style.json      │
       └─────────────────────────────────────────────────────────┘ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* CSS-Variablen werden von build.py aus style.json befüllt */
    :root {
      --bg:           {{COLOR_BG}};
      --surface:      {{COLOR_SURFACE}};
      --border:       {{COLOR_BORDER}};
      --accent:       {{COLOR_ACCENT}};
      --accent2:      {{COLOR_ACCENT2}};
      --text:         {{COLOR_TEXT}};
      --muted:        {{COLOR_MUTED}};
      --font-display: {{FONT_DISPLAY}};
      --font-mono:    {{FONT_MONO}};
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: {{FONT_SIZE_BODY}};
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Navigationsleiste ── */
    nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    nav a.back {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }

    nav a.back:hover { color: var(--accent); }
    nav a.back::before { content: '← '; }

    nav .breadcrumb { font-size: 12px; color: var(--muted); }
    nav .breadcrumb span { color: var(--text); }

    nav .title {
      margin-left: auto;
      font-family: var(--font-display);
      font-size: {{FONT_SIZE_NAV_TITLE}};
      color: var(--accent2);
    }

    /* ── Info-Leiste mit Beschreibung ── */
    .info-bar {
      padding: 0.6rem 1.5rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .info-bar .summary { flex: 1; line-height: 1.5; }

    /* ── Download-Button – Farbe folgt accent aus style.json ── */
    .info-bar a.dl {
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      border: 1px solid var(--accent);
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 11px;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }

    .info-bar a.dl:hover { background: var(--accent); color: var(--bg); }

    /* ── PDF-Viewer ── */
    iframe { flex: 1; width: 100%; border: none; background: #fff; }

  </style>
</head>
<body>

<nav>
  <!-- [TEXT] "Zurück"-Link-Text – frei änderbar -->
  <a class="back" href="../../..">Zurück zur Übersicht</a>
  <!-- [AUTO] Breadcrumb – wird von build.py befüllt -->
  <div class="breadcrumb">{{PRAKTIKUM_NAME}} &nbsp;/&nbsp; <span>{{VERSUCH_NAME}}</span></div>
  <div class="title">{{VERSUCH_NAME}}</div>
</nav>

<div class="info-bar">
  <!-- [AUTO] Beschreibungstext aus description.json → summary -->
  <div class="summary">{{SUMMARY}}</div>
  <!-- [TEXT] Download-Button-Text – frei änderbar -->
  <a class="dl" href="protokoll.pdf" download>↓ PDF</a>
</div>

<!-- [AUTO] PDF-Pfad wird von build.py gesetzt -->
<iframe src="protokoll.pdf" title="Protokoll {{VERSUCH_NAME}}"></iframe>

</body>
</html>
