<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- [AUTO] Titel wird von build.py befüllt -->
  <title>{{VERSUCH_NAME}} – {{PRAKTIKUM_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- [FONT] Schrift-URL aus style.json → fonts.google_fonts_url -->
  <link href="{{FONT_URL}}" rel="stylesheet">
  <style>

    /* ┌─────────────────────────────────────────────────────────┐
       │  ACHTUNG: CSS hier NICHT direkt bearbeiten!             │
       │  Farben, Fonts und Abstände → templates/style.json      │
       └─────────────────────────────────────────────────────────┘ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           {{COLOR_BG}};
      --surface:      {{COLOR_SURFACE}};
      --border:       {{COLOR_BORDER}};
      --accent:       {{COLOR_ACCENT}};
      --accent2:      {{COLOR_ACCENT2}};
      --text:         {{COLOR_TEXT}};
      --muted:        {{COLOR_MUTED}};
      --font-display: {{FONT_DISPLAY}};
      --font-mono:    {{FONT_MONO}};
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: {{FONT_SIZE_BODY}};
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    nav a.back {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }

    nav a.back:hover { color: var(--accent); }
    nav a.back::before { content: '← '; }

    nav .breadcrumb { font-size: 12px; color: var(--muted); }
    nav .breadcrumb span { color: var(--text); }

    nav .title {
      margin-left: auto;
      font-family: var(--font-display);
      font-size: {{FONT_SIZE_NAV_TITLE}};
      color: var(--accent2);
    }

    .info-bar {
      padding: 0.6rem 1.5rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .info-bar .summary { flex: 1; line-height: 1.5; }

    .info-bar a.dl {
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      border: 1px solid var(--accent);
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 11px;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }

    .info-bar a.dl:hover { background: var(--accent); color: var(--bg); }

    /* ── PDF.js Canvas-Viewer ── */
    #pdf-container {
      flex: 1;
      overflow-y: auto;
      background: #525659;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      gap: 1rem;
    }

    #pdf-container canvas {
      display: block;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      max-width: 100%;
    }

    #pdf-loading {
      color: #ccc;
      font-family: var(--font-mono);
      font-size: 13px;
      margin-top: 3rem;
    }

    #pdf-error {
      display: none;
      color: #f88;
      font-family: var(--font-mono);
      font-size: 13px;
      margin-top: 3rem;
      text-align: center;
    }

  </style>
</head>
<body>

<nav>
  <!-- [TEXT] "Zurück"-Link-Text – frei änderbar -->
  <a class="back" href="../../..">Zurück zur Übersicht</a>
  <!-- [AUTO] Breadcrumb – wird von build.py befüllt -->
  <div class="breadcrumb">{{PRAKTIKUM_NAME}} &nbsp;/&nbsp; <span>{{VERSUCH_NAME}}</span></div>
  <div class="title">{{VERSUCH_NAME}}</div>
</nav>

<div class="info-bar">
  <!-- [AUTO] Beschreibungstext aus description.json → summary -->
  <div class="summary">{{SUMMARY}}</div>
  <!-- [TEXT] Download-Button-Text – frei änderbar -->
  <a class="dl" href="protokoll.pdf" download>↓ PDF</a>
</div>

<!-- PDF.js Viewer – rendert das PDF seitenweise als Canvas -->
<div id="pdf-container">
  <div id="pdf-loading">PDF wird geladen …</div>
  <div id="pdf-error">
    PDF konnte nicht geladen werden.<br>
    <a href="protokoll.pdf" download style="color: var(--accent);">↓ Direkt herunterladen</a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  // PDF.js 3.x – bewährte stabile Version
  var pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  var container = document.getElementById('pdf-container');
  var loading   = document.getElementById('pdf-loading');
  var errorBox  = document.getElementById('pdf-error');

  pdfjsLib.getDocument('protokoll.pdf').promise.then(function(pdf) {
    loading.style.display = 'none';

    var renderPage = function(pageNum) {
      return pdf.getPage(pageNum).then(function(page) {
        var viewport = page.getViewport({ scale: 1.6 });
        var canvas   = document.createElement('canvas');
        canvas.width  = viewport.width;
        canvas.height = viewport.height;
        container.appendChild(canvas);
        return page.render({
          canvasContext: canvas.getContext('2d'),
          viewport: viewport
        }).promise;
      });
    };

    var chain = Promise.resolve();
    for (var i = 1; i <= pdf.numPages; i++) {
      chain = chain.then(renderPage.bind(null, i));
    }
    return chain;

  }).catch(function(err) {
    loading.style.display = 'none';
    errorBox.style.display = 'block';
    console.error('PDF.js Fehler:', err);
  });
</script>

</body>
</html>
